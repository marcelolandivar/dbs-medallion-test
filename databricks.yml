# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "Project code"

include:
  - resources/*.yml
  - resources/*/*.yml

  # Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  env:
    description: The environment to use
  catalog:
    description: The catalog to use
  host:
    description: The Databricks workspace host URL

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    variables:
      env: dev
      catalog: dev_catalog
      host: https://dbc-f68e7a30-2eef.cloud.databricks.com/
    workspace:
      host: dbc-f68e7a30-2eef.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user}/.bundle/${bundle.name}/${bundle.target}

  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    variables:
      env: prod
      catalog: prod_catalog
    workspace:
      host: dbc-f68e7a30-2eef.cloud.databricks.com/
      # We always use /Users/ferndaguzmanguzman@gmail.com for all resources to make sure we only have a single copy.
      root_path: /Workspace/Users/ferndaguzmanguzman@gmail.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as ferndaguzmanguzman@gmail.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: ferndaguzmanguzman@gmail.com
