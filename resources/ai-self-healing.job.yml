resources:
  jobs:
    orders_pipeline:
      name: "[${var.env}] orders_pipeline_with_dq"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
 
      email_notifications:
        on_failure:
          - data-platform-team@yourcompany.com
 
      job_clusters:
        - job_cluster_key: shared_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            spark_env_vars:
              AZURE_OPENAI_ENDPOINT: "{{secrets/kv-scope/azure-openai-endpoint}}"
 
      tasks:
        - task_key: ingest_raw
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/01_ingest_raw
            base_parameters:
              catalog: "${var.catalog}"
 
        - task_key: transform_silver
          depends_on:
            - task_key: ingest_raw
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/02_transform_silver
            base_parameters:
              catalog: "${var.catalog}"
 
        - task_key: gx_validate
          depends_on:
            - task_key: transform_silver
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/03_gx_validate
            base_parameters:
              table_name: "${var.catalog}.silver.orders"
              suite_name: "orders_suite"
 
        - task_key: ai_agent_analyse
          depends_on:
            - task_key: gx_validate
          run_if: ALL_DONE
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/04_ai_agent_analyse
            base_parameters:
              catalog: "${var.catalog}"
 
        - task_key: critical_action
          depends_on:
            - task_key: ai_agent_analyse
          run_if: ALL_DONE
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/05a_critical_action
            base_parameters:
              catalog: "${var.catalog}"
 
        - task_key: warning_log
          depends_on:
            - task_key: ai_agent_analyse
          run_if: ALL_DONE
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/05b_warning_log
            base_parameters:
              catalog: "${var.catalog}"
 
        - task_key: promote_gold
          depends_on:
            - task_key: ai_agent_analyse
          run_if: ALL_DONE
          job_cluster_key: shared_cluster
          notebook_task:
            notebook_path: ./notebooks/05c_promote_gold
            base_parameters:
              catalog: "${var.catalog}"