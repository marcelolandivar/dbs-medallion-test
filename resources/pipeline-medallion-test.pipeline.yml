resources:
  pipelines:
    medallion_pipeline:
      name: medallion-pipeline
      catalog: dev_catalog
      serverless: true
      development: true
      continuous: false
      channel: CURRENT
      libraries:
        - file:
            path: ../dlt_pipeline.py

targets:
  dev:
    default: true
    workspace:
      root_path: ~/Workspace/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: "dev"
  prod:
    workspace:
      root_path: ~/Workspace/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: "prod"