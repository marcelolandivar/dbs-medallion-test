resources:
  pipelines:
    medallion_pipeline:
      name: medallion-pipeline
      catalog: dev_catalog
      serverless: true
      development: true
      continuous: false
      channel: CURRENT
      libraries:
        - file:
            path: ../dlt_pipeline.py

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/Repos/data/dbs-medallion-test/
    variables:
      catalog: "dev_catalog"
      env: "dev"
  prod:
    workspace:
      root_path: /Workspace/Repos/data/dbs-medallion-test/
    variables:
      catalog: "prod_catalog"
      env: "prod"