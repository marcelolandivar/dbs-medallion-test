resources:
  jobs:
    Job:
      name: Job
      queue:
        enabled: true
      run_as:
        service_principal_name: "a76aaeca-00b8-4e18-aad3-e94b43d51bc8"
      tasks:
         - task_key: script_task
           spark_python_task:
             python_file: ../main.py
             parameters: ["{{job.parameters.env}}"]
             source: WORKSPACE
           environment_key: Default
      parameters:
        - name: env
          default: "dev"
      environments:
        - environment_key: Default
          spec:
            environment_version: '2'
      email_notifications:
         on_failure:
           - ferndaguzmanguzman@gmail.com
      trigger:
         # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
         periodic:
           interval: 1
           unit: DAYS
      performance_target: PERFORMANCE_OPTIMIZED
