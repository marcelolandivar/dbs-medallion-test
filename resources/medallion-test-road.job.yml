resources:
  jobs:
    Job:
      name: Job
      queue:
        enabled: true
      tasks:
         - task_key: script_task
           spark_python_task:
             python_file: ../main.py
           environment_key: dev
      environments:
        - environment_key: dev
          spec:
            environment_version: '2'
      email_notifications:
         on_failure:
           - ferndaguzmanguzman@gmail.com
      trigger:
         # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
         periodic:
           interval: 1
           unit: DAYS
